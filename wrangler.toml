# Configuración de Wrangler para Cloudflare Pages
# Wrangler es la CLI de Cloudflare para gestionar Workers y Pages

# Nombre del proyecto en Cloudflare
name = "fluxdev-blog"

# Fecha de compatibilidad para las APIs de Cloudflare
compatibility_date = "2026-06-01"

# Directorio donde Astro genera el build estático
pages_build_output_dir = "./dist"

# Flags de compatibilidad
compatibility_flags = ["nodejs_compat"]


# Configuración de base de datos D1 (SQLite en el Edge)
[[d1_databases]]
binding = "DB"  # Nombre de la variable en el código
database_name = "blog-comments"  # Nombre de la base de datos
database_id = "744a94e3-069c-4f0e-8e2a-40358b2dc74b"  # ID único de la DB en Cloudflare

# Configuración de KV Namespace
[[kv_namespaces]]
binding = "KV"  # Nombre de la variable en el código
id = "9b86fe89e24443fb892f1e2b91383d12"  # ID del KV namespace "posts-cache"
